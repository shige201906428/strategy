name: Run Trend Reversal Screener

on:
  # 手動実行用
  workflow_dispatch:
  # 定期実行用（必要に応じてコメントアウトを解除してください）
  schedule:
    - cron: '0 20 * * *' # 日本時間の毎日朝5:00に自動実行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. リポジトリのコードをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Python環境のセットアップ
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. 必要なライブラリのインストール（追加分を含む）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy tqdm requests beautifulsoup4 lxml

      # 4. スクリプトの実行（環境変数を渡して全銘柄を対象にする）
      - name: Run screener script
        env:
          SCREENER_CHOICE: "3" # S&P500 と TOPIX の両方を実行
        run: |
          python screener.py # ※スクリプトのファイル名が異なる場合はここを修正してください

      # 5. 生成された index.html をリポジトリにプッシュ
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          # 差分がある場合のみコミットしてプッシュ
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update screening report [skip ci]" && git push)
