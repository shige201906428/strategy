name: US Stock Data Update

on:
  schedule:
    - cron: '0 22 * * *'  # 07:00 JST
    - cron: '30 14 * * *' # 23:30 JST
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas timezonefinder
          
      - name: Run Scraper
        run: python src/scraper.py
        
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 認証情報をセット
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          
          git fetch origin main
          git reset --mixed origin/main
          
          # CSVも新しく生成されたindex.htmlもすべて一括でGitに対象登録
          git add .
          
          # 更新日時が変わるため必ずコミットが走るように設定
          if ! git diff --cached --exit-code --quiet; then
            git commit -m "自動更新: $(date +'%Y-%m-%d %H:%M:%S') (JST)"
            git push origin main
          else
            echo "変更がないため終了します"
          fi
